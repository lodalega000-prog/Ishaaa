<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TG Num Lookup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Courier New', monospace; }
    pre { font-size: 15px; line-height: 1.6; }
  </style>
</head>
<body class="bg-white min-h-screen text-black flex items-center justify-center p-6">

  <div id="main" class="max-w-2xl w-full">
    <!-- Loading -->
    <div id="loading" class="text-center py-20">
      <div class="inline-block w-8 h-8 border-4 border-black border-t-transparent rounded-full animate-spin"></div>
      <p class="mt-4 text-xl">Fetching data...</p>
    </div>

    <!-- Error -->
    <div id="error" class="hidden bg-red-50 border border-red-300 rounded-2xl p-10 text-center">
      <p id="error-text" class="text-3xl font-bold text-red-600"></p>
      <p class="mt-6 text-sm text-gray-500">Correct format:<br>
        <span class="font-mono bg-white px-3 py-1 rounded border">?Tgnum&key=2dayfree&userid=1234567890</span>
      </p>
    </div>

    <!-- Result -->
    <div id="result" class="hidden">
      <div class="bg-white border border-gray-300 rounded-3xl p-8 shadow-sm">
        <pre id="json" class="bg-gray-100 p-8 rounded-2xl overflow-auto text-left text-emerald-700"></pre>
      </div>
      <div class="text-center mt-8 text-gray-500 text-sm">
        developer :- <span class="text-black font-medium">@WHITExTRUSTED</span>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    
    const hasTgnum = params.has('Tgnum');
    const key = params.get('key');
    const userid = params.get('userid') || params.get('id') || params.get('user-id');

    const EXPIRY_DATE = new Date('2026-03-05T00:00:00Z'); // ← 2 din baad change kar dena

    async function showResult() {
      document.getElementById('loading').classList.add('hidden');

      // Wrong format
      if (!hasTgnum || !key || !userid) {
        document.getElementById('error-text').innerHTML = '❌ Wrong Format';
        document.getElementById('error').classList.remove('hidden');
        return;
      }

      // Wrong key
      if (key !== '2dayfree') {
        document.getElementById('error-text').innerHTML = '❌ Wrong key';
        document.getElementById('error').classList.remove('hidden');
        return;
      }

      // Key expired
      if (new Date() > EXPIRY_DATE) {
        document.getElementById('error-text').innerHTML = '⛔ key expired key';
        document.getElementById('error').classList.remove('hidden');
        return;
      }

      // Fetch real API
      try {
        const res = await fetch(`https://usesirosint.vercel.app/api/tgnum?key=narutox07z&id=${encodeURIComponent(userid)}`);
        const data = await res.json();

        const numberInfo = data?.RESULT?.NUMBER_INFO;

        if (!numberInfo) {
          document.getElementById('error-text').innerHTML = 'Number info nahi mila';
          document.getElementById('error').classList.remove('hidden');
          return;
        }

        // Pretty print only NUMBER_INFO
        const cleanData = { NUMBER_INFO: numberInfo };
        document.getElementById('json').textContent = JSON.stringify(cleanData, null, 2);
        
        document.getElementById('result').classList.remove('hidden');

      } catch (e) {
        document.getElementById('error-text').innerHTML = 'Server error, baad mein try karo';
        document.getElementById('error').classList.remove('hidden');
      }
    }

    // Start
    showResult();
  </script>
</body>
</html>
